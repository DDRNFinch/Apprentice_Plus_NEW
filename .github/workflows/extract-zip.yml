      - name: Install packages
        working-directory: apprentice-plus
        run: npm install

      - name: Install web dependencies
        working-directory: apprentice-plus
        run: |
          npx expo install react-native-web react-dom @expo/metro-runtime

      - name: Build web app
        working-directory: apprentice-plus
        run: npx expo export --platform web

      - name: Copy website to docs
        run: |
          rm -rf docs
          mkdir docs
          cp -R apprentice-plus/dist/. docs/
          touch docs/.nojekyll
      - name: Copy website to docs
        run: |
          rm -rf docs
          mkdir docs
          cp -R apprentice-plus/dist/. docs/
          touch docs/.nojekyll

      - name: Commit built website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Build Apprentice Plus website"
          git push
